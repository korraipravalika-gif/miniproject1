<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Virtual Dice Roller Board</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.game{
    width:1000px;
    max-width:95%;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

button{
    padding:12px 24px;
    border:none;
    background:#3b82f6;
    color:white;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    background:#2563eb;
}

.board{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:5px;
    margin-bottom:40px;
}

.cell{
    height:60px;
    background:#1e293b;
    border:1px solid #334155;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    font-weight:bold;
}

.player{
    width:22px;
    height:22px;
    border-radius:50%;
    position:absolute;
    bottom:4px;
}

.p1{
    background:#22c55e;
}

.p2{
    background:#ef4444;
    left:30px;
}

.scene{
    width:180px;
    height:180px;
    perspective:1000px;
    margin:auto;
}

.dice{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 2s cubic-bezier(.17,.67,.2,1);
}

.face{
    position:absolute;
    width:180px;
    height:180px;
    background:white;
    border:3px solid #111;
    border-radius:20px;
}

.dot{
    width:20px;
    height:20px;
    background:black;
    border-radius:50%;
    position:absolute;
}

.front{transform:translateZ(90px);}
.back{transform:rotateY(180deg) translateZ(90px);}
.right{transform:rotateY(90deg) translateZ(90px);}
.left{transform:rotateY(-90deg) translateZ(90px);}
.topf{transform:rotateX(90deg) translateZ(90px);}
.bottom{transform:rotateX(-90deg) translateZ(90px);}

.info{
    text-align:center;
    margin-top:20px;
    font-size:22px;
}
</style>
</head>
<body>

<div class="game">

<div class="top">
    <h1>🎲 Virtual Dice Board</h1>
    <button id="rollBtn">Roll Dice</button>
</div>

<div class="board" id="board"></div>

<div class="scene">
    <div class="dice" id="dice">

        <div class="face front"></div>
        <div class="face back"></div>
        <div class="face right"></div>
        <div class="face left"></div>
        <div class="face topf"></div>
        <div class="face bottom"></div>

    </div>
</div>

<div class="info" id="info">
Player 1 Turn
</div>

</div>

<script>

const board=document.getElementById("board");
const dice=document.getElementById("dice");
const info=document.getElementById("info");
const rollBtn=document.getElementById("rollBtn");

const SIZE=50;

for(let i=1;i<=SIZE;i++){
    const cell=document.createElement("div");
    cell.className="cell";
    cell.id="cell-"+i;
    cell.innerHTML=i;
    board.appendChild(cell);
}

const players=[
{
    pos:1,
    class:"p1"
},
{
    pos:1,
    class:"p2"
}
];

let current=0;

function renderPlayers(){

document.querySelectorAll(".player").forEach(p=>p.remove());

players.forEach(player=>{
    const token=document.createElement("div");
    token.className=`player ${player.class}`;
    document.getElementById(`cell-${player.pos}`).appendChild(token);
});
}

renderPlayers();

function createDot(x,y,parent){

const dot=document.createElement("div");
dot.className="dot";
dot.style.left=x+"px";
dot.style.top=y+"px";
parent.appendChild(dot);
}

function drawFaces(){

const faces=document.querySelectorAll(".face");

faces.forEach(f=>{
    f.innerHTML="";
});

const positions={
        c:[80,80],
        tl:[30,30],
        tr:[130,30],
        bl:[30,130],
        br:[130,130],
        ml:[30,80],
        mr:[130,80]
};

const values=[
["c"],
["tl","br"],
["tl","c","br"],
["tl","tr","bl","br"],
["tl","tr","c","bl","br"],
["tl","tr","ml","mr","bl","br"]
];

faces.forEach((face,index)=>{
    values[index].forEach(pos=>{
        createDot(
            positions[pos][0],
            positions[pos][1],
            face
        );
    });
});

}

drawFaces();

const rotations={
1:"rotateX(0deg) rotateY(0deg)",
2:"rotateY(-90deg)",
3:"rotateX(-90deg)",
4:"rotateX(90deg)",
5:"rotateY(90deg)",
6:"rotateY(180deg)"
};

function rollDice(){

rollBtn.disabled=true;

const value=Math.floor(Math.random()*6)+1;

const rx=720+Math.floor(Math.random()*360);
const ry=720+Math.floor(Math.random()*360);

dice.style.transform=
`rotateX(${rx}deg)
 rotateY(${ry}deg)`;

setTimeout(()=>{

dice.style.transform=rotations[value];

movePlayer(value);

},2000);
}

function movePlayer(steps){

let player=players[current];

player.pos+=steps;

if(player.pos>SIZE){
    player.pos=SIZE;
}

renderPlayers();

if(player.pos===SIZE){

info.innerHTML=
`🏆 Player ${current+1} Wins!`;

rollBtn.disabled=true;
return;
}

current=(current+1)%players.length;

info.innerHTML=
`Player ${current+1} Turn
(Dice: ${steps})`;

rollBtn.disabled=false;
}

rollBtn.addEventListener("click",rollDice);

</script>

</body>
</html>
